<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Square | Declare Family</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #FFD700; --gold-muted: rgba(255, 215, 0, 0.1); --red: #FF4B4B;
            --bg-dark: #050505; --panel: #0A0A0B; --border: rgba(255, 255, 255, 0.06);
            --text-main: #E1E1E1; --text-dim: #88888E; --green: #00FF94;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: #000; color: var(--text-main); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; height: 100vh; display: flex; overflow: hidden; }

        /* --- SIDEBAR: NAVIGATION --- */
        .nav-sidebar { width: 260px; background: #000; border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; }
        .nav-brand { color: var(--gold); font-weight: 800; font-size: 18px; letter-spacing: 2px; margin-bottom: 30px; text-align: center; }
        .nav-label { font-size: 10px; color: #444; text-transform: uppercase; letter-spacing: 1.5px; margin: 20px 0 10px; display: block; }
        .nav-item { padding: 12px 15px; border-radius: 10px; cursor: pointer; transition: 0.3s; color: var(--text-dim); text-decoration: none; display: flex; align-items: center; gap: 12px; font-size: 13px; font-weight: 600; }
        .nav-item:hover, .nav-item.active { background: var(--gold-muted); color: var(--gold); }

        /* --- CENTER: BROADCAST COMMAND --- */
        .center-stage { flex: 1; display: flex; flex-direction: column; background: var(--bg-dark); }
        
        /* Fixed Video Box - Hidden by default to save resources */
        .video-box { 
            width: 100%; aspect-ratio: 16/9; background: #000; position: relative; 
            overflow: hidden; border-bottom: 1px solid var(--border);
            display: none; /* Auto-expand logic in JS */
        }
        .video-box.active { display: block; }

        #liveCanvas, #stagedVideo { width: 100%; height: 100%; object-fit: cover; }
        #reactionLayer { position: absolute; inset: 0; pointer-events: none; z-index: 200; }

        /* PLAYER OVERLAYS */
        .v-overlay { position: absolute; inset: 0; padding: 15px; display: flex; flex-direction: column; justify-content: space-between; z-index: 210; opacity: 0; transition: 0.3s; }
        .video-box:hover .v-overlay { opacity: 1; background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 50%, rgba(0,0,0,0.8) 100%); }
        
        .broadcaster-tag { position: absolute; bottom: 15px; left: 15px; background: rgba(0,0,0,0.8); padding: 6px 12px; border-radius: 6px; font-size: 10px; font-weight: 900; border-left: 3px solid var(--gold); color: #fff; z-index: 220; text-transform: uppercase; }
        
        .ctrl-row { display: flex; justify-content: space-between; align-items: center; }
        .v-btn { background: rgba(255,255,255,0.1); border: none; color: #fff; padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 11px; font-weight: 800; backdrop-filter: blur(10px); transition: 0.2s; }
        .v-btn:hover { background: var(--gold); color: #000; }

        .tool-grid { padding: 20px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .tool-btn { background: var(--panel); border: 1px solid var(--border); color: var(--text-dim); padding: 15px 0; border-radius: 14px; font-size: 10px; font-weight: 800; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 8px; transition: 0.2s; }
        .tool-btn.active { border-color: var(--green); color: var(--green); }

        /* --- RIGHT: INTERACTION SIDEBAR --- */
        .right-sidebar { width: 380px; background: #000; border-left: 1px solid var(--border); display: flex; flex-direction: column; }
        .chat-list { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column-reverse; gap: 15px; }
        .bubble { background: var(--panel); padding: 14px; border-radius: 18px; border: 1px solid var(--border); }
        .bubble strong { font-size: 11px; color: var(--gold); display: block; margin-bottom: 5px; }

        .interaction-hub { padding: 20px; background: #080808; border-top: 1px solid var(--border); }
        .emoji-bar { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .emoji-btn { font-size: 26px; cursor: pointer; transition: 0.2s; }
        .emoji-btn:hover { transform: scale(1.3) translateY(-5px); }

        .input-wrap { background: #111; border: 1px solid #222; border-radius: 15px; padding: 10px 15px; display: flex; gap: 10px; }
        textarea { flex: 1; background: transparent; border: none; color: #fff; resize: none; height: 20px; font-size: 14px; font-family: inherit; }

        /* FLOATING REACTIONS */
        .floating-emoji { position: absolute; bottom: 50px; font-size: 45px; pointer-events: none; animation: floatUp 3.5s forwards cubic-bezier(0.1, 0.8, 1.0, 0.1); z-index: 250; }
        @keyframes floatUp { 0% { transform: translateY(0) scale(0); opacity: 0; } 20% { opacity: 1; transform: scale(1.2); } 100% { transform: translateY(-500px) translateX(40px) rotate(30deg); opacity: 0; } }
    </style>
</head>
<body>

    <div class="nav-sidebar">
        <div class="nav-brand">DECLARE</div>
        
        <span class="nav-label">General</span>
        <a href="hub.html" class="nav-item">💬 Hub Feed</a>
        <a href="thread.html" class="nav-item active">🟦 Square Terminal</a>
        <a href="https://www.biblegateway.com/passage/?search=Genesis+1&version=NKJV" target="_blank" class="nav-item">📖 Bible (NKJV)</a>

        <span class="nav-label">Mission Control</span>
        <a href="academy.html" class="nav-item">📚 Academy</a>
        <a href="projects.html" class="nav-item">🚀 Projects</a>
    </div>

    <div class="center-stage">
        <div class="video-box" id="vContainer">
            <canvas id="liveCanvas"></canvas>
            <video id="stagedVideo" playsinline loop muted></video>
            <div id="reactionLayer"></div>

            <div class="v-overlay">
                <div class="ctrl-row">
                    <span style="font-size:10px; font-weight:900; color:var(--red); letter-spacing:1px;">• LIVE TRANSMISSION</span>
                    <button class="v-btn" onclick="toggleFull()">⛶ MAXIMIZE</button>
                </div>
                <div class="ctrl-row">
                    <div style="display:flex; gap:10px;">
                        <button class="v-btn" id="playBtn" onclick="togglePlay()">▶ PLAY</button>
                        <button class="v-btn" id="muteBtn" onclick="toggleMute()">🔊 VOLUME</button>
                    </div>
                </div>
            </div>
            <div class="broadcaster-tag" id="broadcasterTag">IDENTIFYING BROADCASTER...</div>
        </div>

        <div class="tool-grid">
            <button class="tool-btn" id="micBtn" onclick="useTool('mic')"><span>🎤</span>MIC</button>
            <button class="tool-btn" id="recBtn" onclick="useTool('rec')"><span>🔴</span>REC</button>
            <button class="tool-btn" id="camBtn" onclick="useTool('cam')"><span>📷</span>CAM</button>
            <button class="tool-btn" id="shareBtn" onclick="useTool('share')"><span>🖥️</span>SHARE</button>
        </div>

        <div style="padding:0 25px;">
            <h4 id="mTitle" style="color:var(--gold); margin: 0 0 8px;">Standby for Mission</h4>
            <p id="mDesc" style="color:var(--text-dim); font-size:14px; line-height:1.6;">The transmission screen is currently minimized. It will auto-expand once a Pioneer begins sharing.</p>
        </div>
    </div>

    <div class="right-sidebar">
        <div class="chat-list" id="chatList"></div>
        <div class="interaction-hub">
            <div class="emoji-bar">
                <span class="emoji-btn" onclick="sendEmoji('🔥')">🔥</span>
                <span class="emoji-btn" onclick="sendEmoji('👏')">👏</span>
                <span class="emoji-btn" onclick="sendEmoji('🙌')">🙌</span>
                <span class="emoji-btn" onclick="sendEmoji('❤️')">❤️</span>
                <span class="emoji-btn" onclick="sendEmoji('💯')">💯</span>
                <span class="emoji-btn" onclick="sendEmoji('⚡')">⚡</span>
            </div>
            <div class="input-wrap">
                <textarea id="msgInput" placeholder="Send to Square..."></textarea>
                <button onclick="post()" style="background:var(--gold); border:none; padding:0 18px; border-radius:10px; font-weight:800; cursor:pointer;">POST</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("liveCanvas");
        const ctx = canvas.getContext("2d", { alpha: false });
        const video = document.getElementById("stagedVideo");
        const vContainer = document.getElementById("vContainer");
        const bTag = document.getElementById("broadcasterTag");

        // --- HIGH PERFORMANCE SYNC ENGINE ---
        function initSync() {
            let lastFrame = null;

            function renderLoop() {
                const frame = localStorage.getItem("liveScreenFrame");
                const daily = JSON.parse(localStorage.getItem("dailyTopic"));
                const user = JSON.parse(localStorage.getItem("loggedInUser")) || {name: "Vision Pioneer"};

                // 1. AUTO-VISIBILITY & BROADCASTER IDENTIFICATION
                if (frame || (daily && daily.media)) {
                    vContainer.classList.add("active");
                    bTag.innerText = "SHARING: " + user.name;
                } else {
                    vContainer.classList.remove("active");
                }

                // 2. ANTI-FREEZE RENDERER
                if (frame && frame !== lastFrame) {
                    lastFrame = frame;
                    video.style.display = "none";
                    canvas.style.display = "block";
                    
                    const img = new Image();
                    img.onload = () => {
                        if(canvas.width !== img.width) {
                            canvas.width = img.width;
                            canvas.height = img.height;
                        }
                        ctx.drawImage(img, 0, 0);
                        img.src = ""; // Force memory release to stop freezing
                    };
                    img.src = frame;
                } else if (daily && daily.media && daily.media.type === 'video') {
                    canvas.style.display = "none";
                    video.style.display = "block";
                    if(video.src !== daily.media.data) video.src = daily.media.data;
                }

                if(daily) {
                    document.getElementById("mTitle").innerText = daily.title;
                    document.getElementById("mDesc").innerText = daily.desc;
                }
                requestAnimationFrame(renderLoop);
            }
            requestAnimationFrame(renderLoop);
        }

        // --- PLAYER CONTROLS ---
        function togglePlay() { 
            if(video.paused) { video.play(); document.getElementById("playBtn").innerText = "⏸ PAUSE"; }
            else { video.pause(); document.getElementById("playBtn").innerText = "▶ PLAY"; }
        }
        function toggleMute() { video.muted = !video.muted; document.getElementById("muteBtn").innerText = video.muted ? "🔇 MUTED" : "🔊 VOLUME"; }
        function toggleFull() { if(!document.fullscreenElement) vContainer.requestFullscreen(); else document.exitFullscreen(); }
        
        // --- REACTION ENGINE ---
        function sendEmoji(emoji) {
            const el = document.createElement("div");
            el.className = "floating-emoji";
            el.innerText = emoji;
            el.style.left = Math.random() * 70 + 15 + "%";
            document.getElementById("reactionLayer").appendChild(el);
            setTimeout(() => el.remove(), 3500);
        }

        function refreshChat() {
            const list = document.getElementById("chatList");
            const msgs = JSON.parse(localStorage.getItem("threadComments")) || [];
            list.innerHTML = msgs.map(m => `
                <div class="bubble">
                    <strong>${m.name}</strong>
                    <p style="margin:0; font-size:13px; color:#ccc;">${m.text}</p>
                </div>
            `).join('');
        }

        function post() {
            const input = document.getElementById("msgInput");
            if(!input.value.trim()) return;
            const msgs = JSON.parse(localStorage.getItem("threadComments")) || [];
            msgs.unshift({ name: "Declare Member", text: input.value });
            localStorage.setItem("threadComments", JSON.stringify(msgs));
            input.value = ""; refreshChat();
        }

        function useTool(id) { document.getElementById(id+'Btn').classList.toggle('active'); }

        document.addEventListener("DOMContentLoaded", () => {
            initSync();
            refreshChat();
            setInterval(refreshChat, 3000);
        });
    </script>
</body>
</html>
