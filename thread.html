<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Square | Declare Family Operations</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #FFD700; --gold-muted: rgba(255, 215, 0, 0.1); --red: #FF4B4B;
            --bg-dark: #050505; --panel: #0A0A0B; --border: rgba(255, 255, 255, 0.06);
            --text-main: #E1E1E1; --text-dim: #88888E; --green: #00FF94;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: #000; color: var(--text-main); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; height: 100vh; display: flex; overflow: hidden; }

        /* --- NAVIGATION SIDEBAR --- */
        .nav-sidebar { width: 260px; background: #000; border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; }
        .nav-brand { color: var(--gold); font-weight: 800; font-size: 18px; letter-spacing: 2px; margin-bottom: 30px; text-align: center; border: 1px solid var(--gold); padding: 5px; }
        .nav-label { font-size: 10px; color: #444; text-transform: uppercase; letter-spacing: 1.5px; margin: 20px 0 10px; display: block; }
        .nav-item { padding: 12px 15px; border-radius: 10px; cursor: pointer; transition: 0.3s; color: var(--text-dim); text-decoration: none; display: flex; align-items: center; gap: 12px; font-size: 13px; font-weight: 600; }
        .nav-item:hover, .nav-item.active { background: var(--gold-muted); color: var(--gold); }
        .pioneer-only { border: 1px solid rgba(0, 255, 148, 0.2); margin-top: 5px; border-radius: 10px; display: none; }

        /* --- CENTER STAGE: THE GRID --- */
        .center-stage { flex: 1; display: flex; flex-direction: column; background: var(--bg-dark); overflow: hidden; position: relative; }
        
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 12px;
            padding: 20px;
            flex: 1;
            background: #000;
            overflow-y: auto;
            align-content: start;
        }

        .participant-box {
            aspect-ratio: 16/9;
            background: #111;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }

        .participant-box.active-speaker { border: 2px solid var(--gold); box-shadow: 0 0 15px rgba(255, 215, 0, 0.2); }

        .participant-video { width: 100%; height: 100%; object-fit: cover; }
        
        .participant-label {
            position: absolute; bottom: 10px; left: 10px;
            background: rgba(0, 0, 0, 0.7); padding: 5px 10px;
            border-radius: 6px; font-size: 10px; font-weight: 800;
            color: white; display: flex; align-items: center; gap: 6px;
        }

        .status-dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; animation: pulse 1.5s infinite; }

        .avatar-placeholder {
            width: 70px; height: 70px; background: var(--gold-muted);
            color: var(--gold); border-radius: 50%; display: flex;
            align-items: center; justify-content: center; font-size: 28px; font-weight: 800;
        }

        /* --- TOOLS & OPS --- */
        .tool-grid { padding: 15px 20px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; border-top: 1px solid var(--border); }
        .tool-btn { background: var(--panel); border: 1px solid var(--border); color: var(--text-dim); padding: 12px 0; border-radius: 12px; font-size: 10px; font-weight: 800; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 6px; transition: 0.3s; }
        .tool-btn:hover { background: #151515; }
        .tool-btn.active { border-color: var(--gold); color: var(--gold); background: var(--gold-muted); }

        /* --- RIGHT SIDEBAR --- */
        .right-sidebar { width: 360px; background: #000; border-left: 1px solid var(--border); display: flex; flex-direction: column; }
        .chat-list { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column-reverse; gap: 12px; }
        .bubble { background: var(--panel); padding: 12px; border-radius: 15px; border: 1px solid var(--border); }
        .bubble strong { font-size: 11px; color: var(--gold); display: block; margin-bottom: 4px; }
        .pioneer-msg { border-left: 3px solid var(--green); background: rgba(0, 255, 148, 0.03); }

        .input-wrap { padding: 20px; background: #080808; border-top: 1px solid var(--border); display: flex; gap: 10px; }
        textarea { flex: 1; background: #111; border: 1px solid #222; border-radius: 10px; color: #fff; padding: 10px; resize: none; height: 40px; font-size: 13px; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <div class="nav-sidebar">
        <div class="nav-brand">DECLARE FAMILY</div>
        <span class="nav-label">Core Navigation</span>
        <a href="hub.html" class="nav-item">💬 Global Hub</a>
        <a href="thread.html" class="nav-item active">🟦 The Square</a>
        <a href="academy.html" class="nav-item">📚 Academy</a>
        
        <span class="nav-label">Resources</span>
        <a href="https://www.biblegateway.com" target="_blank" class="nav-item">📖 Open Word</a>
        
        <div id="pioneerLink" class="pioneer-only">
            <span class="nav-label" style="color: var(--green);">Leadership Command</span>
            <a href="leadership.html" class="nav-item" style="color: var(--green);">🛠️ Pioneer Dashboard</a>
        </div>
    </div>

    <div class="center-stage">
        <div id="scheduleAlert" style="background: rgba(255, 215, 0, 0.1); border-bottom: 1px solid var(--gold); padding: 10px 20px; font-size: 12px; display: none;">
            <span id="alertText" style="color: var(--gold); font-weight: 800;"></span>
        </div>

        <div class="video-grid" id="participantGrid">
            <div class="participant-box active-speaker" id="hostBox">
                <video id="stagedVideo" class="participant-video" autoplay playsinline muted></video>
                <canvas id="liveCanvas" class="participant-video" style="display:none;"></canvas>
                <div class="participant-label">
                    <div class="status-dot"></div>
                    <span>VISION PIONEER (HOST)</span>
                </div>
            </div>
        </div>

        <div class="tool-grid">
            <button class="tool-btn" id="micBtn" onclick="toggleLocalMedia('mic')"><span>🎤</span>MIC</button>
            <button class="tool-btn" id="camBtn" onclick="toggleLocalMedia('cam')"><span>📷</span>CAMERA</button>
            <button class="tool-btn" id="shareBtn" onclick="useTool('share')"><span>🖥️</span>SHARE</button>
            <button class="tool-btn" id="recBtn" onclick="useTool('rec')"><span>🔴</span>REC</button>
        </div>
    </div>

    <div class="right-sidebar">
        <div style="padding: 15px 20px; border-bottom: 1px solid var(--border); font-size: 12px; font-weight: 800; color: var(--gold);">SESSION CHAT</div>
        <div class="chat-list" id="chatList"></div>
        <div class="input-wrap">
            <textarea id="msgInput" placeholder="Send a message..."></textarea>
            <button onclick="post()" style="background: var(--gold); border: none; padding: 0 15px; border-radius: 8px; font-weight: 800; cursor: pointer;">SEND</button>
        </div>
    </div>

    <script>
        // --- INITIALIZATION ---
        const user = JSON.parse(localStorage.getItem("loggedInUser")) || { name: "Member", role: "member", id: "guest" };

        let localStream = null;
        let screenStream = null;
        let mediaRecorder = null;
        let recordedChunks = [];

        function handleNavigation() {
            if (user.role === 'admin' || user.role === 'leader') {
                document.getElementById("pioneerLink").style.display = "block";
            }
        }

        function syncEngine() {
            const stagedVideo = document.getElementById("stagedVideo");
            function frameUpdate() {
                const liveFrame = localStorage.getItem("liveScreenFrame");
                stagedVideo.style.opacity = (liveFrame === "ACTIVE_STREAM_SIGNAL") ? "1" : "0.5";
                requestAnimationFrame(frameUpdate);
            }
            requestAnimationFrame(frameUpdate);
        }

        // --- CORE FUNCTION: MIC & CAMERA ---
        async function toggleLocalMedia(type) {
            const btn = document.getElementById(type + 'Btn');
            const myId = "box-" + user.id;
            let myBox = document.getElementById(myId);

            if (!myBox) {
                myBox = document.createElement('div');
                myBox.className = 'participant-box';
                myBox.id = myId;
                myBox.innerHTML = `
                    <div class="avatar-placeholder">${user.name.charAt(0)}</div>
                    <video class="participant-video" autoplay playsinline muted style="display:none;"></video>
                    <div class="participant-label">
                        <span id="mic-icon-${myId}">🔇</span>
                        <span>${user.name} (You)</span>
                    </div>
                `;
                document.getElementById('participantGrid').appendChild(myBox);
            }

            try {
                if (!localStream) {
                    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                }

                if (type === 'cam') {
                    const videoTrack = localStream.getVideoTracks()[0];
                    const isActive = btn.classList.toggle('active');
                    videoTrack.enabled = isActive;
                    
                    let videoEl = myBox.querySelector('video');
                    videoEl.srcObject = localStream;
                    myBox.querySelector('.avatar-placeholder').style.display = isActive ? 'none' : 'flex';
                    videoEl.style.display = isActive ? 'block' : 'none';
                }

                if (type === 'mic') {
                    const audioTrack = localStream.getAudioTracks()[0];
                    const isActive = btn.classList.toggle('active');
                    audioTrack.enabled = isActive;
                    document.getElementById(`mic-icon-${myId}`).innerText = isActive ? "🎙️" : "🔇";
                }
            } catch (err) {
                console.error("Access Denied:", err);
                alert("Please allow permissions.");
            }
        }

        // --- CORE FUNCTION: TOOLS ---
        async function shareScreen() {
            const btn = document.getElementById('shareBtn');
            if (!btn.classList.contains('active')) {
                try {
                    screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                    document.getElementById('stagedVideo').srcObject = screenStream;
                    btn.classList.add('active');
                    localStorage.setItem("liveScreenFrame", "ACTIVE_STREAM_SIGNAL");
                    screenStream.getVideoTracks()[0].onended = () => stopSharing();
                } catch (err) { console.error(err); }
            } else { stopSharing(); }
        }

        function stopSharing() {
            if (screenStream) screenStream.getTracks().forEach(track => track.stop());
            document.getElementById('stagedVideo').srcObject = localStream;
            document.getElementById('shareBtn').classList.remove('active');
            localStorage.removeItem("liveScreenFrame");
        }

        function toggleRecording() {
            const btn = document.getElementById('recBtn');
            if (!btn.classList.contains('active')) {
                const stream = screenStream || localStream;
                if (!stream) return alert("Nothing to record.");
                recordedChunks = [];
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = `Declare-Session-${Date.now()}.webm`;
                    a.click();
                };
                mediaRecorder.start();
                btn.classList.add('active');
            } else {
                mediaRecorder.stop();
                btn.classList.remove('active');
            }
        }

        function useTool(id) {
            if (id === 'share') shareScreen();
            if (id === 'rec') toggleRecording();
        }

        // --- MODERATION, CHAT & SCHEDULING ---
        function listenForModeration() {
            const commands = JSON.parse(localStorage.getItem("systemCommands")) || {};
            if (commands[user.id] === "MUTE") {
                document.getElementById("micBtn").classList.remove("active");
                alert("MODERATION: Muted.");
                delete commands[user.id];
                localStorage.setItem("systemCommands", JSON.stringify(commands));
            }
            if (commands[user.id] === "KICK") {
                window.location.href = "hub.html";
                delete commands[user.id];
                localStorage.setItem("systemCommands", JSON.stringify(commands));
            }
        }

        function checkSchedule() {
            const now = new Date();
            const alertBox = document.getElementById("scheduleAlert");
            if ((now.getDay() === 4 || now.getDay() === 0) && now.getHours() >= 19) { 
                alertBox.style.display = "block";
                document.getElementById("alertText").innerText = "SESSION STARTING SOON";
            }
        }

        function refreshChat() {
            const list = document.getElementById("chatList");
            const msgs = JSON.parse(localStorage.getItem("threadComments")) || [];
            list.innerHTML = msgs.map(m => `
                <div class="bubble ${m.role === 'admin' ? 'pioneer-msg' : ''}">
                    <strong>${m.name} ${m.role === 'admin' ? '✓' : ''}</strong>
                    <p style="margin:0; font-size:12px; color:#ddd;">${m.text}</p>
                </div>
            `).join('');
        }

        function post() {
            const input = document.getElementById("msgInput");
            if(!input.value.trim()) return;
            const msgs = JSON.parse(localStorage.getItem("threadComments")) || [];
            msgs.unshift({ name: user.name, text: input.value, role: user.role });
            localStorage.setItem("threadComments", JSON.stringify(msgs));
            input.value = ""; refreshChat();
        }

        document.addEventListener("DOMContentLoaded", () => {
            handleNavigation();
            syncEngine();
            refreshChat();
            checkSchedule();
            setInterval(refreshChat, 2500);
            setInterval(listenForModeration, 2000);
        });
    </script>
</body>
</html>
