<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register | Declare Family</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root { --gold: #FFD700; --dark: #0a0a0a; --panel: #121212; --border: rgba(255,255,255,0.08); }
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--dark); color: white;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; padding: 20px;
}
.bg-glow {
    position: fixed; inset: 0; z-index: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(255,215,0,0.06) 0%, transparent 70%);
    pointer-events: none;
}
.container {
    background: var(--panel); padding: 45px 40px;
    border-radius: 24px; width: 100%; max-width: 400px;
    border: 1px solid var(--border);
    box-shadow: 0 30px 60px rgba(0,0,0,0.6);
    position: relative; z-index: 1;
    animation: fadeUp 0.5s ease;
}
@keyframes fadeUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }
.logo-area { text-align: center; margin-bottom: 30px; }
.logo-area h2 { color: var(--gold); font-size: 22px; font-weight: 800; letter-spacing: 2px; }
.logo-area p { color: #555; font-size: 13px; margin-top: 6px; }
label { display: block; font-size: 11px; font-weight: 800; color: #666; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px; }
.field { margin-bottom: 18px; }
input, select {
    width: 100%; padding: 14px 16px;
    border: 1px solid #222; border-radius: 12px;
    background: #000; color: white;
    font-family: inherit; font-size: 14px;
    transition: border-color 0.2s; outline: none;
}
input:focus, select:focus { border-color: var(--gold); }
input::placeholder { color: #444; }
select option { background: #111; }
.secret-field { display: none; border: 1px dashed rgba(255,215,0,0.4) !important; }
.btn {
    width: 100%; padding: 15px; background: var(--gold);
    border: none; border-radius: 12px;
    font-family: inherit; font-weight: 800; font-size: 14px;
    letter-spacing: 1px; text-transform: uppercase;
    cursor: pointer; transition: 0.2s; margin-top: 5px;
}
.btn:hover { background: #fff; }
.btn:active { transform: scale(0.98); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.error-msg { background: rgba(255,77,77,0.1); border: 1px solid rgba(255,77,77,0.3); color: #ff6b6b; padding: 12px 16px; border-radius: 10px; font-size: 13px; margin-bottom: 18px; display: none; }
.link-row { text-align: center; margin-top: 20px; }
a { color: var(--gold); text-decoration: none; font-size: 13px; font-weight: 600; }
a:hover { text-decoration: underline; }
.hint { font-size: 11px; color: #444; margin-top: 6px; }
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="container">
    <div class="logo-area">
        <h2>CREATE ACCOUNT</h2>
        <p>Join the Declare Family ecosystem</p>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="field">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="Your full name" autocomplete="name">
    </div>
    <div class="field">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="field">
        <label>Account Type</label>
        <select id="role" onchange="toggleAccessKey()">
            <option value="member">General Member</option>
            <option value="leader">Pioneer (Leader)</option>
            <option value="admin">System Administrator</option>
        </select>
    </div>
    <div class="field" id="keyField" style="display:none;">
        <label>Access Key</label>
        <input type="password" id="secretKey" class="secret-field" placeholder="Enter your access key">
        <p class="hint">Contact the executive team for an access key.</p>
    </div>
    <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="Min. 6 characters" autocomplete="new-password">
    </div>
    <div class="field">
        <label>Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Repeat password" autocomplete="new-password">
    </div>

    <button class="btn" id="regBtn" onclick="handleRegister()">Create Account</button>

    <div class="link-row">
        <a href="login.html">Already have an account? Login</a>
    </div>
</div>

<script>
function simpleHash(str) {
    let hash = 0;
    for (let i = 0; i < str.length; i++) {
        const char = str.charCodeAt(i);
        hash = ((hash << 5) - hash) + char;
        hash = hash & hash;
    }
    return hash.toString(36);
}

// Access keys are hashed — do not store plain-text keys in source
// The hash below corresponds to the key set by the admin
const VALID_KEY_HASH = simpleHash('DF-ADMIN-2026');

function toggleAccessKey() {
    const role = document.getElementById('role').value;
    const keyField = document.getElementById('keyField');
    keyField.style.display = (role === 'admin' || role === 'leader') ? 'block' : 'none';
    document.getElementById('secretKey').className = 'secret-field';
}

function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
}

function generateDeclareID(fullName, role) {
    const initials = fullName.split(' ').map(n => n[0] || '').join('').toUpperCase().slice(0, 3);
    const year = '26';
    if (role === 'admin') {
        const users = JSON.parse(localStorage.getItem('users')) || [];
        const adminCount = users.filter(u => u.role === 'admin').length;
        return `DF-ADM-${String(adminCount + 1).padStart(3,'0')}/${year}-${initials}`;
    }
    if (role === 'leader') {
        const users = JSON.parse(localStorage.getItem('users')) || [];
        const leaderCount = users.filter(u => u.role === 'leader').length;
        return `DF-PNR-${String(leaderCount + 1).padStart(3,'0')}/${year}-${initials}`;
    }
    const randomNum = Math.floor(100 + Math.random() * 899);
    return `DF-2026-${randomNum}/${initials}`;
}

function handleRegister() {
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const role = document.getElementById('role').value;
    const secretKey = document.getElementById('secretKey').value;
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const btn = document.getElementById('regBtn');

    document.getElementById('errorMsg').style.display = 'none';

    if (!name || !email || !password) { showError('Please fill in all required fields.'); return; }
    if (password.length < 6) { showError('Password must be at least 6 characters.'); return; }
    if (password !== confirmPassword) { showError('Passwords do not match.'); return; }

    if ((role === 'admin' || role === 'leader') && simpleHash(secretKey) !== VALID_KEY_HASH) {
        showError('Invalid access key. Contact the executive team.');
        return;
    }

    const users = JSON.parse(localStorage.getItem('users')) || [];
    if (users.find(u => u.email === email)) {
        showError('An account with this email already exists.');
        return;
    }

    btn.disabled = true;
    btn.textContent = 'Creating Account...';

    setTimeout(() => {
        const memberID = generateDeclareID(name, role);
        const newUser = {
            name, email, role, memberID,
            passwordHash: simpleHash(password),
            joinedDate: new Date().toLocaleDateString('en-GB')
        };

        users.push(newUser);
        localStorage.setItem('users', JSON.stringify(users));

        // Session (no password stored)
        localStorage.setItem('loggedInUser', JSON.stringify(newUser));

        if (role === 'admin' || role === 'leader') {
            window.location.href = 'leadership.html';
        } else {
            window.location.href = 'main.html';
        }
    }, 500);
}

document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') handleRegister();
});
</script>
</body>
</html>
