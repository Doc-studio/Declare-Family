<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Declare Family</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root { --gold: #FFD700; --dark: #0a0a0a; --panel: #121212; --border: rgba(255,255,255,0.08); }
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--dark); color: white;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; padding: 20px;
}
.bg-glow {
    position: fixed; inset: 0; z-index: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(255,215,0,0.06) 0%, transparent 70%);
    pointer-events: none;
}
.container {
    background: var(--panel); padding: 45px 40px;
    border-radius: 24px; width: 100%; max-width: 380px;
    border: 1px solid var(--border);
    box-shadow: 0 30px 60px rgba(0,0,0,0.6);
    position: relative; z-index: 1;
    animation: fadeUp 0.5s ease;
}
@keyframes fadeUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }
.logo-area { text-align: center; margin-bottom: 35px; }
.logo-area h2 { color: var(--gold); font-size: 22px; font-weight: 800; letter-spacing: 2px; }
.logo-area p { color: #555; font-size: 13px; margin-top: 6px; }
label { display: block; font-size: 11px; font-weight: 800; color: #666; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px; }
.field { margin-bottom: 20px; }
input {
    width: 100%; padding: 14px 16px;
    border: 1px solid #222; border-radius: 12px;
    background: #000; color: white;
    font-family: inherit; font-size: 14px;
    transition: border-color 0.2s;
    outline: none;
}
input:focus { border-color: var(--gold); }
input::placeholder { color: #444; }
.btn {
    width: 100%; padding: 15px;
    background: var(--gold); border: none; border-radius: 12px;
    font-family: inherit; font-weight: 800; font-size: 14px;
    letter-spacing: 1px; text-transform: uppercase;
    cursor: pointer; transition: 0.2s; margin-top: 5px;
}
.btn:hover { background: #fff; }
.btn:active { transform: scale(0.98); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.error-msg { background: rgba(255,77,77,0.1); border: 1px solid rgba(255,77,77,0.3); color: #ff6b6b; padding: 12px 16px; border-radius: 10px; font-size: 13px; margin-bottom: 20px; display: none; }
.link-row { text-align: center; margin-top: 25px; }
a { color: var(--gold); text-decoration: none; font-size: 13px; font-weight: 600; }
a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="container">
    <div class="logo-area">
        <h2>DECLARE FAMILY</h2>
        <p>Enter your credentials to access the platform</p>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="field">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn" id="loginBtn" onclick="handleLogin()">Login</button>

    <div class="link-row">
        <a href="index.html">Don't have an account? Register</a>
    </div>
</div>

<script>
function simpleHash(str) {
    let hash = 0;
    for (let i = 0; i < str.length; i++) {
        const char = str.charCodeAt(i);
        hash = ((hash << 5) - hash) + char;
        hash = hash & hash;
    }
    return hash.toString(36);
}

function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
}

function handleLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');

    document.getElementById('errorMsg').style.display = 'none';

    if (!email || !password) {
        showError('Please fill in both fields.');
        return;
    }

    btn.disabled = true;
    btn.textContent = 'Verifying...';

    setTimeout(() => {
        const users = JSON.parse(localStorage.getItem('users')) || [];
        const hashedPwd = simpleHash(password);
        // Support both old (plain text) and new (hashed) passwords for backwards compatibility
        const user = users.find(u => u.email === email && (u.password === password || u.passwordHash === hashedPwd));

        if (!user) {
            showError('Invalid email or password. Please try again.');
            btn.disabled = false;
            btn.textContent = 'Login';
            return;
        }

        // Update to hashed password if still plain text
        if (user.password && !user.passwordHash) {
            user.passwordHash = simpleHash(user.password);
            delete user.password;
            const idx = users.findIndex(u => u.email === email);
            users[idx] = user;
            localStorage.setItem('users', JSON.stringify(users));
        }

        // Store session (without password)
        const sessionUser = { ...user };
        delete sessionUser.password;
        delete sessionUser.passwordHash;
        localStorage.setItem('loggedInUser', JSON.stringify(sessionUser));

        if (user.role === 'admin' || user.role === 'leader') {
            window.location.href = 'leadership.html';
        } else {
            window.location.href = 'main.html';
        }
    }, 400);
}

// Allow Enter key to submit
document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') handleLogin();
});
</script>
</body>
</html>
