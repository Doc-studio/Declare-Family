<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Talent Showcase | Declare Family</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="declare-db.js"></script>
<style>
:root{
  --gold:#FFD700;--dark:#050505;--panel:#0E0E10;
  --border:rgba(255,255,255,0.09);--green:#00FF94;--red:#FF3B30;
  --purple:#A855F7;--blue:#4A9EFF;--dim:#888;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-thumb{background:var(--gold);border-radius:10px;}
body{background:var(--dark);color:#f0f0f0;font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh;}

.topbar{background:#000;border-bottom:1px solid var(--border);padding:0 5%;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.topbar-brand{font-weight:800;font-size:13px;color:var(--gold);letter-spacing:1px;}
.topbar-nav a{padding:8px 14px;border-radius:8px;text-decoration:none;color:#666;font-size:12px;font-weight:700;transition:.2s;margin-left:4px;}
.topbar-nav a:hover{color:var(--gold);}

.hero{text-align:center;padding:48px 5% 32px;border-bottom:1px solid var(--border);}
.hero h1{font-family:'DM Serif Display',serif;font-size:clamp(2rem,5vw,3rem);background:linear-gradient(90deg,#fff,var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px;}
.hero p{color:var(--dim);font-size:14px;max-width:500px;margin:0 auto 24px;}
.hero-actions{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;}

.upload-btn{display:inline-flex;align-items:center;gap:8px;background:var(--gold);color:#000;border:none;padding:12px 24px;border-radius:30px;font-weight:800;font-size:13px;cursor:pointer;font-family:inherit;transition:.2s;}
.upload-btn:hover{background:#fff;}
.write-btn{display:inline-flex;align-items:center;gap:8px;background:transparent;color:var(--gold);border:2px solid var(--gold);padding:11px 22px;border-radius:30px;font-weight:800;font-size:13px;cursor:pointer;font-family:inherit;transition:.2s;}
.write-btn:hover{background:var(--gold);color:#000;}
input[type="file"]{display:none;}

.container{max-width:1100px;margin:0 auto;padding:36px 5%;}

/* FILTER */
.filter-bar{display:flex;gap:8px;margin-bottom:28px;flex-wrap:wrap;}
.filter-pill{padding:7px 16px;border-radius:20px;border:1px solid var(--border);background:none;color:#555;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;transition:.2s;}
.filter-pill:hover,.filter-pill.active{background:rgba(168,85,247,.08);border-color:var(--purple);color:var(--purple);}

/* GALLERY GRID */
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:20px;}

.talent-card{background:var(--panel);border:1px solid var(--border);border-radius:20px;overflow:hidden;transition:.35s;position:relative;}
.talent-card:hover{border-color:rgba(168,85,247,.3);transform:translateY(-4px);}
.talent-card .pinned-badge{position:absolute;top:12px;left:12px;background:var(--gold);color:#000;font-size:9px;font-weight:800;padding:3px 10px;border-radius:20px;z-index:2;display:none;}
.talent-card.pinned .pinned-badge{display:block;}

.talent-media{position:relative;background:#0a0a0a;aspect-ratio:4/3;overflow:hidden;}
.talent-media img,.talent-media video{width:100%;height:100%;object-fit:cover;display:block;}
.talent-media .text-preview{
  height:100%;display:flex;align-items:center;justify-content:center;
  padding:24px;font-style:italic;color:#ccc;font-size:14px;line-height:1.6;
  text-align:center;background:linear-gradient(135deg,#0a0a0a,#111020);
}
.media-type-badge{position:absolute;bottom:10px;right:10px;background:rgba(0,0,0,.7);color:#fff;font-size:9px;font-weight:800;padding:3px 8px;border-radius:6px;letter-spacing:1px;text-transform:uppercase;}

.talent-body{padding:16px;}
.talent-title{font-size:15px;font-weight:800;margin-bottom:4px;color:#fff;}
.talent-author{font-size:12px;color:var(--gold);margin-bottom:12px;}
.talent-actions{display:flex;align-items:center;gap:6px;margin-bottom:12px;}
.like-btn{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.04);border:1px solid var(--border);color:#888;padding:5px 12px;border-radius:20px;font-size:12px;cursor:pointer;transition:.2s;font-family:inherit;}
.like-btn:hover,.like-btn.liked{background:rgba(255,215,0,.08);border-color:rgba(255,215,0,.3);color:var(--gold);}
.leader-actions{margin-left:auto;display:flex;gap:6px;}
.ldr-act-btn{background:none;border:1px solid #1a1a1a;color:#333;padding:5px 10px;border-radius:8px;font-size:10px;cursor:pointer;font-family:inherit;transition:.2s;}
.ldr-act-btn:hover{border-color:var(--red);color:var(--red);}
.ldr-act-btn.pin-btn:hover{border-color:var(--gold);color:var(--gold);}

/* COMMENTS */
.comments-section{border-top:1px solid var(--border);padding:12px 16px;}
.comment-list{max-height:160px;overflow-y:auto;margin-bottom:10px;}
.comment-item{display:flex;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);}
.comment-item:last-child{border-bottom:none;}
.comment-avatar{width:24px;height:24px;border-radius:50%;background:var(--purple);color:#fff;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.comment-content{flex:1;min-width:0;}
.comment-name{font-size:10px;font-weight:800;color:var(--gold);}
.comment-text{font-size:12px;color:#aaa;word-break:break-word;}
.comment-input-row{display:flex;gap:8px;}
.comment-input-row input{flex:1;background:#000;border:1px solid #1a1a1a;border-radius:8px;color:#fff;padding:8px 12px;font-family:inherit;font-size:12px;outline:none;transition:.2s;}
.comment-input-row input:focus{border-color:var(--purple);}
.comment-send{background:var(--purple);color:#fff;border:none;width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:14px;flex-shrink:0;transition:.2s;}
.comment-send:hover{background:#9333ea;}

/* WRITE MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:500;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal-box{background:#0a0a0a;border:1px solid var(--gold);border-radius:20px;width:100%;max-width:500px;padding:28px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.modal-title{font-family:'DM Serif Display',serif;font-size:1.4rem;margin-bottom:16px;color:var(--gold);}
.modal-input{width:100%;background:#000;border:1px solid #222;border-radius:10px;color:#fff;padding:11px 14px;font-family:inherit;font-size:13px;outline:none;transition:.2s;margin-bottom:10px;}
.modal-input:focus{border-color:var(--gold);}
textarea.modal-input{resize:vertical;min-height:120px;}
.modal-actions{display:flex;gap:10px;margin-top:4px;}
.modal-btn{flex:1;padding:12px;border-radius:10px;font-weight:800;font-size:13px;cursor:pointer;font-family:inherit;transition:.2s;}
.modal-btn.primary{background:var(--gold);color:#000;border:none;}
.modal-btn.primary:hover{background:#fff;}
.modal-btn.cancel{background:none;border:1px solid #222;color:#666;}
.modal-btn.cancel:hover{border-color:var(--red);color:var(--red);}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:#333;grid-column:1/-1;}
.empty-icon{font-size:56px;margin-bottom:16px;}

.toast{position:fixed;bottom:24px;right:24px;background:var(--green);color:#000;padding:12px 20px;border-radius:12px;font-weight:700;font-size:13px;transform:translateY(20px);opacity:0;transition:.3s;z-index:600;pointer-events:none;}
.toast.show{transform:translateY(0);opacity:1;}

@media(max-width:600px){
  .gallery{grid-template-columns:1fr;}
  .container{padding:24px 12px;}
}
</style>
</head>
<body>

<nav class="topbar">
  <span class="topbar-brand">🎨 TALENT SHOWCASE</span>
  <div class="topbar-nav">
    <a href="hub.html">🌐 Hub</a>
    <a href="academy.html">🎓 Academy</a>
    <a href="leadership.html" id="leaderLink" style="display:none;">🛡️ Command</a>
  </div>
</nav>

<div class="hero">
  <h1>Family Talent Showcase</h1>
  <p>Music, Art, Poetry, and Innovation. The world needs what you carry — show the family what you're building.</p>
  <div class="hero-actions">
    <button class="upload-btn" onclick="document.getElementById('fileUpload').click()">📎 Upload Your Work</button>
    <button class="write-btn" onclick="openWriteModal()">✍️ Write Something Creative</button>
  </div>
  <input type="file" id="fileUpload" accept="image/*,video/*,audio/*" onchange="processUpload(event)">
</div>

<div class="container">
  <div class="filter-bar">
    <button class="filter-pill active" onclick="setFilter('all',this)">All</button>
    <button class="filter-pill" onclick="setFilter('image',this)">🖼 Images</button>
    <button class="filter-pill" onclick="setFilter('video',this)">🎥 Videos</button>
    <button class="filter-pill" onclick="setFilter('audio',this)">🎵 Audio</button>
    <button class="filter-pill" onclick="setFilter('text',this)">✍️ Writing</button>
  </div>
  <div class="gallery" id="gallery"></div>
</div>

<!-- WRITE MODAL -->
<div class="modal-overlay" id="writeModal">
  <div class="modal-box">
    <div class="modal-title">✍️ Creative Expression</div>
    <input type="text" class="modal-input" id="writeTitle" placeholder="Give your work a title *">
    <textarea class="modal-input" id="writeContent" placeholder="Poetry, lyrics, story, insight — let it flow..."></textarea>
    <input type="text" class="modal-input" id="writeCategory" placeholder="Category (e.g. Poetry, Story, Lyrics)">
    <div class="modal-actions">
      <button class="modal-btn primary" onclick="submitWrite()">PUBLISH →</button>
      <button class="modal-btn cancel" onclick="closeWriteModal()">Cancel</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// Auth + responsive
if(!DB.isLoggedIn()){ window.location.href='login.html'; }
(function(){
  function dl(){ document.body.setAttribute('data-layout', window.innerWidth < 600 ? 'mobile' : 'desktop'); }
  dl(); window.addEventListener('resize', dl);
  window.addEventListener('orientationchange', function(){ setTimeout(dl, 200); });
})();

var u = DB.currentUser() || {name:'Guest',role:'member'};
var isLeader = DB.isLeader(u);
var activeFilter = 'all';
var likedPosts = (DB.get('talentLikes_'+(u.email||u.name||'guest')) || []);

if(isLeader) document.getElementById('leaderLink').style.display='inline';

/* FILTER */
window.setFilter = function(f, btn){
  activeFilter = f;
  document.querySelectorAll('.filter-pill').forEach(function(b){b.classList.remove('active');});
  if(btn) btn.classList.add('active');
  renderGallery();
};

/* PROCESS UPLOAD */
window.processUpload = function(e){
  var file = e.target.files[0];
  if(!file) return;
  var title = prompt('Enter a title for your work:');
  if(!title) return;
  var reader = new FileReader();
  reader.onload = function(ev){
    var type = file.type.startsWith('video')?'video':file.type.startsWith('audio')?'audio':'image';
    var entry = {
      id:DB.ts(), type:type, src:ev.target.result,
      title:title, author:u.name||'Member',
      category:type.charAt(0).toUpperCase()+type.slice(1),
      likes:0, pinned:false, comments:[], time:DB.ts()
    };
    var talents = DB.getTalents();
    talents.unshift(entry);
    DB.set(DB.KEYS.talents, talents);
    DB.pushHubMessage({id:entry.id,name:u.name,role:u.role||'member',text:u.name+' shared new '+type+': "'+title+'"',type:'talent',time:entry.time,reactions:{}});
    renderGallery();
    showToast('Work published to the showcase!');
  };
  reader.readAsDataURL(file);
  e.target.value='';
};

/* WRITE MODAL */
window.openWriteModal = function(){ document.getElementById('writeModal').classList.add('open'); };
window.closeWriteModal = function(){ document.getElementById('writeModal').classList.remove('open'); };
window.submitWrite = function(){
  var title = (document.getElementById('writeTitle').value||'').trim();
  var content = (document.getElementById('writeContent').value||'').trim();
  if(!title||!content){showToast('Title and content required.','#FF3B30');return;}
  var entry = {
    id:DB.ts(), type:'text', content:content,
    title:title, author:u.name||'Member',
    category:document.getElementById('writeCategory').value||'Writing',
    likes:0, pinned:false, comments:[], time:DB.ts()
  };
  var talents = DB.getTalents();
  talents.unshift(entry);
  DB.set(DB.KEYS.talents, talents);
  DB.pushHubMessage({id:entry.id,name:u.name,role:u.role||'member',text:u.name+' posted creative writing: "'+title+'"',type:'talent',time:entry.time,reactions:{}});
  ['writeTitle','writeContent','writeCategory'].forEach(function(id){document.getElementById(id).value='';});
  closeWriteModal();
  renderGallery();
  showToast('Published!');
};

/* RENDER */
function renderGallery(){
  var talents = DB.getTalents();
  if(activeFilter !== 'all') talents = talents.filter(function(t){return t.type===activeFilter;});
  // Pinned first
  talents.sort(function(a,b){return (b.pinned?1:0)-(a.pinned?1:0)||(b.time-a.time);});
  var grid = document.getElementById('gallery');
  if(!talents.length){
    grid.innerHTML='<div class="empty"><div class="empty-icon">🎨</div><p>No talent posts yet.<br>Be the first to share your work!</p></div>';
    return;
  }
  grid.innerHTML = talents.map(function(item){
    var myEmail2 = u.email||u.name||"guest"; var isLiked = Array.isArray(item.likes) ? item.likes.includes(myEmail2) : likedPosts.indexOf(item.id)>-1;
    var mediaHTML = '';
    if(item.type==='image') mediaHTML='<img src="'+item.src+'" alt="'+DB.esc(item.title)+'" loading="lazy">';
    else if(item.type==='video') mediaHTML='<video src="'+item.src+'" controls preload="none"></video>';
    else if(item.type==='audio') mediaHTML='<div class="text-preview" style="flex-direction:column;gap:12px;"><span style="font-size:40px;">🎵</span><audio src="'+item.src+'" controls style="width:80%;"></audio></div>';
    else mediaHTML='<div class="text-preview">"'+DB.esc((item.content||'').substring(0,150)+(item.content&&item.content.length>150?'…':''))+'"</div>';

    var comments = item.comments||[];
    var commentsHTML = comments.slice(-3).map(function(c){
      return '<div class="comment-item">'+
        '<div class="comment-avatar">'+DB.esc((c.user||'M').charAt(0).toUpperCase())+'</div>'+
        '<div class="comment-content"><div class="comment-name">'+DB.esc(c.user)+'</div><div class="comment-text">'+DB.esc(c.text)+'</div></div>'+
      '</div>';
    }).join('');

    return '<div class="talent-card'+(item.pinned?' pinned':'')+'" id="tlnt-'+item.id+'">'+
      '<span class="pinned-badge">📌 Pinned</span>'+
      '<div class="talent-media">'+
        mediaHTML+
        '<span class="media-type-badge">'+(item.category||item.type)+'</span>'+
      '</div>'+
      '<div class="talent-body">'+
        '<div class="talent-title">'+DB.esc(item.title)+'</div>'+
        '<div class="talent-author">By '+DB.esc(item.author)+'</div>'+
        '<div class="talent-actions">'+
          '<button class="like-btn'+(isLiked?' liked':'')+'" onclick="likePost('+item.id+',this)">♥ '+(Array.isArray(item.likes)?item.likes.length:(item.likes||0))+'</button>'+
          (isLeader?
            '<div class="leader-actions">'+
              '<button class="ldr-act-btn pin-btn" onclick="togglePin('+item.id+')">📌 '+(item.pinned?'Unpin':'Pin')+'</button>'+
              '<button class="ldr-act-btn" onclick="removeTalent('+item.id+')">✕</button>'+
            '</div>':'')+
        '</div>'+
      '</div>'+
      '<div class="comments-section">'+
        '<div class="comment-list" id="clist-'+item.id+'">'+commentsHTML+'</div>'+
        '<div class="comment-input-row">'+
          '<input type="text" placeholder="Add a comment..." id="cinput-'+item.id+'" onkeypress="handleCommentKey(event,'+item.id+')">'+
          '<button class="comment-send" onclick="addComment('+item.id+')">↑</button>'+
        '</div>'+
      '</div>'+
    '</div>';
  }).join('');
}

window.likePost = function(id, btn){
  var idx = likedPosts.indexOf(id);
  var talents = DB.getTalents();
  var item = talents.find(function(t){return t.id===id;});
  if(!item) return;
  if(idx > -1){ likedPosts.splice(idx,1); item.likes=Math.max(0,(item.likes||0)-1); btn.classList.remove('liked'); }
  else { likedPosts.push(id); item.likes=(item.likes||0)+1; btn.classList.add('liked'); }
  DB.set(DB.KEYS.talents, talents);
  DB.set('talentLikes_'+(u.email||u.name||'guest'), likedPosts);
  btn.textContent='♥ '+item.likes;
};

window.togglePin = function(id){
  if(!isLeader) return;
  var talents = DB.getTalents();
  var item = talents.find(function(t){return t.id===id;});
  if(!item) return;
  item.pinned = !item.pinned;
  DB.set(DB.KEYS.talents, talents);
  renderGallery();
  showToast(item.pinned?'Post pinned to top!':'Post unpinned.');
};

window.removeTalent = function(id){
  if(!isLeader) return;
  if(!confirm('Remove this post from the showcase?')) return;
  DB.deleteTalent(id);
  renderGallery();
  showToast('Post removed.');
};

window.handleCommentKey = function(e, id){
  if(e.key==='Enter') addComment(id);
};

window.addComment = function(id){
  var input = document.getElementById('cinput-'+id);
  var txt = (input.value||'').trim();
  if(!txt) return;
  var talents = DB.getTalents();
  var item = talents.find(function(t){return t.id===id;});
  if(!item) return;
  if(!item.comments) item.comments=[];
  item.comments.push({user:u.name||'Guest',text:txt,time:DB.ts()});
  DB.set(DB.KEYS.talents, talents);
  input.value='';
  renderGallery();
};

function showToast(msg,color){
  var t=document.getElementById('toast');
  t.textContent=msg;t.style.background=color||'var(--green)';t.style.color=color?'#fff':'#000';
  t.classList.add('show');setTimeout(function(){t.classList.remove('show');},3500);
}

renderGallery();
setInterval(renderGallery, 8000);
</script>
</body>
</html>
